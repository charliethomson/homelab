lavalink:
    plugins:
    -   dependency: dev.lavalink.youtube:youtube-plugin:1.18.0
        snapshot: false
    -   dependency: com.github.topi314.lavasrc:lavasrc-plugin:4.8.1
        snapshot: false
    server:
        password: ${LAVALINK_PASSWORD}
        sources:
            youtube: false
            bandcamp: true
            soundcloud: true
            twitch: true
            vimeo: true
            http: true
            local: false
            nico: true
        bufferDurationMs: 400
        frameBufferDurationMs: 5000
        trackStuckThresholdMs: 10000
        useSeekGhosting: true
        youtubePlaylistLoadLimit: 6
        youtubeSearchEnabled: true
        soundcloudSearchEnabled: true
        gc-warnings: true
        opusEncodingQuality: 10
        resamplingQuality: LOW
        playerUpdateInterval: 5
        nonAllocatingFrameBuffer: false
        filters:
            volume: true
            equalizer: true
            karaoke: true
            timescale: true
            tremolo: true
            vibrato: true
            distortion: true
            rotation: true
            channelMix: true
            lowPass: true

plugins:
    lavasrc:
        providers:
        - ytsearch:"%ISRC%"
        - ytsearch:%QUERY%
        sources:
            spotify: true
            applemusic: false
            deezer: false
            yandexmusic: false
            flowerytts: false
            youtube: false
            vkmusic: false
        spotify:
            clientId: ${SPOTIFY_CLIENT_ID}
            clientSecret: ${SPOTIFY_CLIENT_SECRET}
            countryCode: US
            albumLoadLimit: 6
            playlistLoadLimit: 6
            customTokenEndpoint: http://spotify-tokener:49152/api/token
            resolveArtistsInSearch: true
            localFiles: false
            preferAnonymousToken: false
    youtube:
        enabled: true
        allowSearch: true
        allowDirectVideoIds: true
        allowDirectPlaylistIds: true
        clients:
        - TV
        - MUSIC
        - ANDROID_VR
        - ANDROID_MUSIC
        - WEB
        - WEBEMBEDDED
        - TVHTML5_SIMPLY
        oauth:
            enabled: true
            skipInitialization: false
        remoteCipher:
            url: http://yt-cipher:8001
            password: ''
            userAgent: ''
        clientOptions:
            WEB:
                playback: false
                videoLoading: false
            WEBEMBEDDED:
                playlistLoading: false
                searching: false

server:
    address: 0.0.0.0
    port: 2333
    http2:
        enabled: true

logging:
    file:
        path: ./logs/
    level:
        root: INFO
        lavalink: INFO
    request:
        enabled: true
        includeClientInfo: true
        includeHeaders: false
        includePayload: true
        includeQueryString: true
        maxPayloadLength: 10000
    logback:
        rollingpolicy:
            max-history: 30
            max-file-size: 1GB

metrics:
    prometheus:
        enabled: false
        endpoint: /metrics

sentry:
    dsn: ''
    environment: ''
