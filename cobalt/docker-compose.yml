x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

name: cobalt

services:
  cobalt-api:
    image: ghcr.io/imputnet/cobalt:11
    container_name: cobalt-api
    init: true
    read_only: true
    restart: unless-stopped
    ports:
      - 9000:9000
    environment:
      API_URL: ${API_URL}
      API_PORT: "9000"
      API_AUTH_REQUIRED: "1"
      API_KEY_URL: "file:///keys/keys.json"
    volumes:
      - ./live/keys.json:/keys/keys.json:ro
    labels:
      com.centurylinklabs.watchtower.scope: cobalt
    logging: *logging

  watchtower:
    image: containrrr/watchtower:latest
    container_name: cobalt-watchtower
    restart: unless-stopped
    environment:
      TZ: America/New_York
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCOPE: cobalt
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.centurylinklabs.watchtower.scope: cobalt
    logging: *logging
