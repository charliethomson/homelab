x-arr-env: &arr-env
  PUID: "3000"
  PGID: "3000"
  TZ: America/New_York

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: United States
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging: *logging

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      <<: *arr-env
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/truenas/Files/10 - Downloads:/downloads
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: America/New_York
    ports:
      - 8191:8191
    restart: unless-stopped
    logging: *logging

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/lidarr:/config
      - /mnt/truenas/Files/08 - Music:/music
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped
    logging: *logging

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    logging: *logging

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/sonarr:/config
      - /mnt/truenas/Files/04 - Anime/02 - Shows:/tv
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    logging: *logging

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/radarr:/config
      - /mnt/truenas/Files/04 - Anime/04 - Movies:/movies
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
    logging: *logging

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/bazarr:/config
      - /mnt/truenas/Files/04 - Anime/02 - Shows:/tv
      - /mnt/truenas/Files/04 - Anime/04 - Movies:/movies
    ports:
      - 6767:6767
    restart: unless-stopped
    logging: *logging
