x-arr-env: &arr-env
  PUID: "3000"
  PGID: "3000"
  TZ: America/New_York

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: United States
      VPN_PORT_FORWARDING: "on"
      HTTPPROXY: "on"
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
      - 8191:8191
      - 5030:5030
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging: *logging

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      <<: *arr-env
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/truenas/Files/10 - Downloads:/downloads
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  flood:
    image: jesec/flood:latest
    container_name: flood
    command: --auth none --qburl http://gluetun:8080 --qbuser ${QB_USER:-admin} --qbpass ${QB_PASS:-adminadmin}
    ports:
      - 3001:3000
    depends_on:
      - qbittorrent
    restart: unless-stopped
    logging: *logging

  port-updater:
    image: alpine:3
    container_name: port-updater
    command: sh /scripts/port-updater.sh
    environment:
      QB_USER: ${QB_USER:-admin}
      QB_PASS: ${QB_PASS:-adminadmin}
    volumes:
      - ./init/port-updater.sh:/scripts/port-updater.sh:ro
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    restart: unless-stopped
    logging: *logging

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: America/New_York
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    environment:
      SLSKD_SLSK_USERNAME: ${SLSKD_USERNAME}
      SLSKD_SLSK_PASSWORD: ${SLSKD_PASSWORD}
      SLSKD_APP_DIR: /app
      SLSKD_REMOTE_CONFIGURATION: true
    volumes:
      - ./config/slskd:/app
      - /mnt/truenas/Files/10 - Downloads:/downloads
      - /mnt/truenas/Files/08 - Music:/music:ro
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      <<: *arr-env
      LIDARR__AUTH__APIKEY: ${LIDARR_API_KEY}
    volumes:
      - ./config/lidarr:/config
      - /mnt/truenas/Files/08 - Music:/music
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 8686:8686
    restart: unless-stopped
    logging: *logging

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      <<: *arr-env
      PROWLARR__AUTH__APIKEY: ${PROWLARR_API_KEY}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    logging: *logging

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      <<: *arr-env
      SONARR__AUTH__APIKEY: ${SONARR_API_KEY}
    volumes:
      - ./config/sonarr:/config
      - /mnt/truenas/Files/04 - Anime/02 - Shows:/tv
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    logging: *logging

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      <<: *arr-env
      RADARR__AUTH__APIKEY: ${RADARR_API_KEY}
    volumes:
      - ./config/radarr:/config
      - /mnt/truenas/Files/04 - Anime/04 - Movies:/movies
      - /mnt/truenas/Files/10 - Downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
    logging: *logging

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      <<: *arr-env
    volumes:
      - ./config/bazarr:/config
      - /mnt/truenas/Files/04 - Anime/02 - Shows:/tv
      - /mnt/truenas/Files/04 - Anime/04 - Movies:/movies
    ports:
      - 6767:6767
    restart: unless-stopped
    logging: *logging

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    environment:
      TZ: America/New_York
      UN_SONARR_0_URL: http://sonarr:8989
      UN_SONARR_0_API_KEY: ${SONARR_API_KEY}
      UN_RADARR_0_URL: http://radarr:7878
      UN_RADARR_0_API_KEY: ${RADARR_API_KEY}
      UN_LIDARR_0_URL: http://lidarr:8686
      UN_LIDARR_0_API_KEY: ${LIDARR_API_KEY}
    volumes:
      - /mnt/truenas/Files/10 - Downloads:/downloads
    restart: unless-stopped
    logging: *logging

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    environment:
      TZ: America/New_York
      CRON_SCHEDULE: "0 0 * * *"
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_API_KEY: ${RADARR_API_KEY}
    volumes:
      - ./recyclarr:/config
    restart: unless-stopped
    logging: *logging

  init:
    image: alpine:3
    container_name: media-init
    command: sh -c "apk add --no-cache curl jq >/dev/null 2>&1 && sh /scripts/init.sh"
    environment:
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      SONARR_API_KEY: ${SONARR_API_KEY}
      RADARR_API_KEY: ${RADARR_API_KEY}
      LIDARR_API_KEY: ${LIDARR_API_KEY}
    volumes:
      - ./init/init.sh:/scripts/init.sh:ro
    depends_on:
      - prowlarr
      - sonarr
      - radarr
      - lidarr
    restart: "no"
    logging: *logging
